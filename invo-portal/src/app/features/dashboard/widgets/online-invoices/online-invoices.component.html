<div class="card">
  <div class="card-body">

    <!-- Header Row -->
    <div class="header-row">
      <h4 class="card-title mb-0">
        {{ "DASHBOARD.ONLINE_INVOICES" | translate }}
      </h4>
      <div class="legend-wrapper">
        <div class="legend-item legend-item--invoices">
          <span class="legend-dot"></span>
          <span class="legend-label">{{ "DASHBOARD.NUMBER_OF_INVOICES" | translate }}</span>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <apx-chart
        #onlineInvoicesChart
        class="apex-charts"
        [chart]="onlineInvoices.chart"
        [series]="onlineInvoices.series"
        [legend]="onlineInvoices.legend"
        [colors]="onlineInvoices.colors"
        [fill]="onlineInvoices.fill"
        [dataLabels]="onlineInvoices.dataLabels"
        [xaxis]="onlineInvoices.xaxis"
        [stroke]="onlineInvoices.stroke"
        [plotOptions]="onlineInvoices.plotOptions"
      >
      </apx-chart>
    </div>

  </div>
</div>
