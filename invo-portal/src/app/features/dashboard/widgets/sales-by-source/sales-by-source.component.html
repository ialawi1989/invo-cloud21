<div class="card">
  <div class="card-body">

    <!-- Header Row -->
    <div class="header-row">
      <h4 class="card-title mb-0">
        {{ "DASHBOARD.SALES_BY_SOURCE" | translate }}
      </h4>
    </div>
    <!-- Legend -->
    <div class="legend-row" *ngIf="salesBySource?.series?.length">
      <div class="legend-wrapper">
        <div class="legend-item" *ngFor="let label of salesBySource.labels; let i = index">
          <span class="legend-dot"
            [style.background-color]="salesBySource.colors[i % salesBySource.colors.length]"></span>
          <span class="legend-label">{{ label }}</span>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <apx-chart #salesBySourceChart class="apex-charts" [chart]="salesBySource.chart" [series]="salesBySource.series"
        [labels]="salesBySource.labels" [legend]="salesBySource.legend" [colors]="salesBySource.colors"
        [fill]="salesBySource.fill" [dataLabels]="salesBySource.dataLabels" [stroke]="salesBySource.stroke"
        [tooltip]="salesBySource.tooltip" [responsive]="salesBySource.responsive"
        [plotOptions]="salesBySource.plotOptions">
      </apx-chart>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="!salesBySource?.series?.length">
      <div class="empty-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <p>{{ "DASHBOARD.NO_DATA_AVAILABLE" | translate }}</p>
      </div>
    </div>

  </div>
</div>
