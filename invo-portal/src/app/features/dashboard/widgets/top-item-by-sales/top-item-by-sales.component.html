<div class="card">
  <div class="card-body">

    <!-- Header Row -->
    <div class="header-row">
      <h4 class="card-title mb-0">{{ "DASHBOARD.TOP_TEN_ITEMS_BY_SALES" | translate }}</h4>
    </div>

    <!-- Legend -->
    <div class="legend-row">
      <div class="legend-wrapper">
        <div class="legend-item legend-item--sales">
          <span class="legend-dot"></span>
          <span class="legend-label">{{ "DASHBOARD.SALES" | translate }}</span>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <apx-chart
        #topItemBySalesChart
        class="apex-charts"
        [chart]="topItemBySales.chart"
        [series]="topItemBySales.series"
        [legend]="topItemBySales.legend"
        [colors]="topItemBySales.colors"
        [fill]="topItemBySales.fill"
        [dataLabels]="topItemBySales.dataLabels"
        [xaxis]="topItemBySales.xaxis"
        [yaxis]="topItemBySales.yaxis"
        [stroke]="topItemBySales.stroke"
        [plotOptions]="topItemBySales.plotOptions"
        [grid]="topItemBySales.grid"
        [tooltip]="topItemBySales.tooltip">
      </apx-chart>
    </div>

  </div>
</div>
