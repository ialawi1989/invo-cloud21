<div class="card">
  <div class="card-body">

    <!-- Header Row -->
    <div class="header-row">
      <h4 class="card-title mb-0">
        {{ "DASHBOARD.LAST_TWELVE_MONTH_SALES" | translate }}
      </h4>
      <div class="legend-wrapper">
        <div class="legend-item legend-item--sales">
          <span class="legend-dot"></span>
          <span class="legend-label">{{ "DASHBOARD.SALES" | translate }}</span>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <apx-chart
        #lastTwelveMonthsChart
        class="apex-charts"
        [chart]="lastTwelveMonths.chart"
        [series]="lastTwelveMonths.series"
        [legend]="lastTwelveMonths.legend"
        [colors]="lastTwelveMonths.colors"
        [fill]="lastTwelveMonths.fill"
        [dataLabels]="lastTwelveMonths.dataLabels"
        [xaxis]="lastTwelveMonths.xaxis"
        [stroke]="lastTwelveMonths.stroke"
      >
      </apx-chart>
    </div>

  </div>
</div>
