<div class="card">
  <div class="card-body">

    <!-- Header Row -->
    <div class="header-row">
      <h4 class="card-title mb-0">{{ "DASHBOARD.SALES_BY_TIME" | translate }}</h4>
      <div class="filter-buttons">
        <button type="button" class="filter-btn"
          (click)="onChangeBy('byCount')"
          [class.active]="activeOptionButton == 'byCount'">
          {{ "DASHBOARD.BY_COUNT" | translate }}
        </button>
        <button type="button" class="filter-btn"
          (click)="onChangeBy('bySales')"
          [class.active]="activeOptionButton == 'bySales'">
          {{ "DASHBOARD.BY_SALES" | translate }}
        </button>
      </div>
    </div>

    <!-- Legend -->
    <div class="legend-row">
      <div class="legend-wrapper">
        <div class="legend-item legend-item--primary">
          <span class="legend-dot"></span>
          <span class="legend-label">
            {{ activeOptionButton == 'bySales' ? ("DASHBOARD.TOTAL_SALES" | translate) : ("DASHBOARD.TOTAL_COUNT" | translate) }}
          </span>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <apx-chart
        #chartSalesByTime
        class="apex-charts"
        [chart]="salesByTimeChart.chart"
        [series]="salesByTimeChart.series"
        [legend]="salesByTimeChart.legend"
        [colors]="salesByTimeChart.colors"
        [fill]="salesByTimeChart.fill"
        [dataLabels]="salesByTimeChart.dataLabels"
        [xaxis]="salesByTimeChart.xaxis"
        [yaxis]="salesByTimeChart.yaxis"
        [stroke]="salesByTimeChart.stroke"
        [plotOptions]="salesByTimeChart.plotOptions"
        [grid]="salesByTimeChart.grid"
        [tooltip]="salesByTimeChart.tooltip"
        [responsive]="salesByTimeChart.responsive">
      </apx-chart>
    </div>

  </div>
</div>
