<div class="card">
  <div class="card-body">

    <!-- Header Row -->
    <div class="header-row">
      <h4 class="card-title mb-0">
        {{ "DASHBOARD.TOP_BRAND_BY_SALES" | translate }}
      </h4>
    </div>


    <!-- Legend -->
    <div class="legend-row" *ngIf="salesByBrand?.series?.length">
      <div class="legend-wrapper">
        <div class="legend-item" *ngFor="let label of salesByBrand.labels; let i = index">
          <span class="legend-dot" [style.background-color]="salesByBrand.colors[i % salesByBrand.colors.length]"></span>
          <span class="legend-label">{{ label }}</span>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <apx-chart
        #salesByBrandChart
        class="apex-charts"
        [chart]="salesByBrand.chart"
        [series]="salesByBrand.series"
        [labels]="salesByBrand.labels"
        [legend]="salesByBrand.legend"
        [colors]="salesByBrand.colors"
        [fill]="salesByBrand.fill"
        [dataLabels]="salesByBrand.dataLabels"
        [stroke]="salesByBrand.stroke"
        [tooltip]="salesByBrand.tooltip"
        [responsive]="salesByBrand.responsive"
        [plotOptions]="salesByBrand.plotOptions">
      </apx-chart>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="!salesByBrand?.series?.length">
      <div class="empty-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
          <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
        </svg>
        <p>{{ "DASHBOARD.NO_DATA_AVAILABLE" | translate }}</p>
      </div>
    </div>

  </div>
</div>
