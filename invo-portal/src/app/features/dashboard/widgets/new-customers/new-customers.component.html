<div class="card">
  <div class="card-body">

    <!-- Header Row -->
    <div class="header-row">
      <h4 class="card-title mb-0">{{ "DASHBOARD.NEW_CUSTOMERS" | translate }}</h4>
      <span class="customer-count" *ngIf="customerList?.length">{{ customerList.length }}</span>
    </div>

    <!-- Customer List -->
    <div class="customer-list" *ngIf="customerList && customerList.length > 0">
      <div class="customer-item" *ngFor="let customer of customerList; let i = index">
        <div class="customer-avatar" [style.background-color]="getAvatarColor(i)">
          {{ getInitials(customer.getName) }}
        </div>
        <div class="customer-info">
          <span class="customer-name">{{ customer.getName }}</span>
          <span class="customer-time">{{ customer.ago }} {{ "DASHBOARD.AGO" | translate }}</span>
        </div>
        <div class="customer-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
          </svg>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="!customerList || customerList.length === 0">
      <div class="empty-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <p>{{ "DASHBOARD.NO_NEW_CUSTOMERS" | translate }}</p>
      </div>
    </div>

  </div>
</div>
