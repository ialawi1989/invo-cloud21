<div class="card">
  <div class="card-body">

    <!-- Header Row -->
    <div class="header-row">
      <h4 class="card-title mb-0">{{ "DASHBOARD.SALES_BY_DAY" | translate }}</h4>
      <div class="filter-buttons">
        <button type="button" class="filter-btn"
          (click)="onChangeInterval('yesterday')"
          [class.active]="activeOptionButton == 'yesterday'">
          {{ "GENERAL.YESTERDAY" | translate }}
        </button>
        <button type="button" class="filter-btn"
          (click)="onChangeInterval('today')"
          [class.active]="activeOptionButton == 'today'">
          {{ "GENERAL.TODAY" | translate }}
        </button>
        <button type="button" class="filter-btn"
          (click)="onChangeInterval('week')"
          [class.active]="activeOptionButton == 'week'">
          {{ "GENERAL.LAST_N_DAYES" | translate : { value: 7 } }}
        </button>
      </div>
    </div>

    <!-- Legend -->
    <div class="legend-row">
      <div class="legend-wrapper">
        <div class="legend-item legend-item--sales">
          <span class="legend-dot"></span>
          <span class="legend-label">{{ "DASHBOARD.TOTAL_SALES" | translate }}</span>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <apx-chart
        *ngIf="dataLoaded"
        #salesByDayChart
        class="apex-charts"
        [chart]="salesByDay.chart"
        [series]="salesByDay.series"
        [legend]="salesByDay.legend"
        [colors]="salesByDay.colors"
        [fill]="salesByDay.fill"
        [dataLabels]="salesByDay.dataLabels"
        [xaxis]="salesByDay.xaxis"
        [stroke]="salesByDay.stroke"
        [plotOptions]="salesByDay.plotOptions"
        [grid]="salesByDay.grid"
        [tooltip]="salesByDay.tooltip"
        [responsive]="salesByDay.responsive">
      </apx-chart>

      <!-- Loading State -->
      <div class="loading-state" *ngIf="!dataLoaded">
        <div class="loading-spinner"></div>
        <span>{{ "GENERAL.LOADING" | translate }}</span>
      </div>
    </div>

  </div>
</div>
