<div class="card">
  <div class="card-body">

    <!-- Header Row -->
    <div class="header-row">
      <h4 class="card-title mb-0">
        {{ "DASHBOARD.SALES_BY_SERVICE" | translate }}
      </h4>
    </div>

    <!-- Legend -->
    <div class="legend-row" *ngIf="salesByService?.series?.length">
      <div class="legend-wrapper">
        <div class="legend-item" *ngFor="let label of salesByService.labels; let i = index">
          <span class="legend-dot" [style.background-color]="salesByService.colors[i % salesByService.colors.length]"></span>
          <span class="legend-label">{{ label }}</span>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <apx-chart
        #salesByServiceChart
        class="apex-charts"
        [chart]="salesByService.chart"
        [series]="salesByService.series"
        [labels]="salesByService.labels"
        [legend]="salesByService.legend"
        [colors]="salesByService.colors"
        [fill]="salesByService.fill"
        [dataLabels]="salesByService.dataLabels"
        [stroke]="salesByService.stroke"
        [tooltip]="salesByService.tooltip"
        [responsive]="salesByService.responsive"
        [plotOptions]="salesByService.plotOptions">
      </apx-chart>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="!salesByService?.series?.length">
      <div class="empty-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <p>{{ "DASHBOARD.NO_DATA_AVAILABLE" | translate }}</p>
      </div>
    </div>

  </div>
</div>
