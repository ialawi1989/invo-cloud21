<!--
  ─────────────────────────────────────────────────────────────────────────
  Color picker — same trigger and panel theme as the date/time pickers.
  Opens a popover BELOW the trigger via CDK overlay.
  ─────────────────────────────────────────────────────────────────────────
-->
<div class="relative inline-block w-full">
  <!-- Trigger (same shape as the date / time pickers) -->
  <button
    #trigger
    type="button"
    cdkOverlayOrigin
    #triggerOrigin="cdkOverlayOrigin"
    [disabled]="isDisabled()"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-haspopup]="'dialog'"
    [class]="
      'group w-full flex items-center justify-between gap-2 px-3 py-2 text-start text-sm ' +
      'border rounded-lg bg-white transition-colors ' +
      'outline-none focus-visible:border-brand-500 focus-visible:ring-2 focus-visible:ring-brand-100 ' +
      (isDisabled()
        ? 'border-slate-200 text-slate-400 cursor-not-allowed bg-slate-50'
        : invalid()
          ? 'border-red-400 ring-2 ring-red-100 text-slate-700'
          : isOpen()
            ? 'border-brand-500 ring-2 ring-brand-100 text-slate-700'
            : 'border-slate-300 hover:border-slate-400 text-slate-700')
    ">
    <span class="flex items-center gap-2 truncate flex-1">
      <span
        class="w-5 h-5 rounded border border-slate-200 shrink-0"
        [style.background]="hasValue() ? value() : 'transparent'"
        [class.cp-checker]="!hasValue()"
        aria-hidden="true">
      </span>
      <span class="truncate font-mono uppercase tracking-wide">
        @if (hasValue()) {
          {{ value() }}
        } @else {
          <span class="text-slate-400 normal-case font-sans tracking-normal">{{ placeholder() }}</span>
        }
      </span>
    </span>
    <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M12 2C7 8 5 12 5 15a7 7 0 0 0 14 0c0-3-2-7-7-13z"/>
    </svg>
  </button>

  <!-- Popover panel (body-mounted, drops below trigger). -->
  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="triggerOrigin"
    [cdkConnectedOverlayOpen]="isOpen()"
    [cdkConnectedOverlayHasBackdrop]="true"
    cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
    [cdkConnectedOverlayPositions]="[
      { originX: 'start', originY: 'bottom', overlayX: 'start', overlayY: 'top',    offsetY: 4 },
      { originX: 'start', originY: 'top',    overlayX: 'start', overlayY: 'bottom', offsetY: -4 }
    ]"
    (backdropClick)="cancel()"
    (detach)="cancel()">

    <div
      class="bg-white rounded-xl border border-slate-200 shadow-lg p-3 select-none flex flex-col gap-3 w-[260px] max-w-[calc(100vw-16px)]"
      role="dialog"
      aria-label="Color picker">

      <!-- Preset palette -->
      <div class="grid grid-cols-8 gap-1.5" role="group" aria-label="Preset colors">
        @for (hex of presets(); track hex) {
          <button
            type="button"
            class="w-6 h-6 rounded-md border border-slate-200 cursor-pointer transition-transform hover:scale-110 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-300 focus-visible:ring-offset-1"
            [class.ring-2]="isPicked(hex)"
            [class.ring-brand-600]="isPicked(hex)"
            [class.ring-offset-1]="isPicked(hex)"
            [style.background]="hex"
            [attr.aria-label]="hex"
            [attr.title]="hex"
            (click)="pickPreset(hex)">
          </button>
        }
      </div>

      <!-- Custom: native swatch + hex input -->
      <div class="flex items-center gap-2 pt-2 border-t border-slate-100">
        <label class="relative w-8 h-8 rounded-md border border-slate-200 overflow-hidden cursor-pointer bg-white shrink-0" [attr.title]="'Custom color'">
          <input
            type="color"
            class="absolute inset-0 w-full h-full p-0 m-0 border-0 cursor-pointer opacity-0"
            [value]="draft() || '#32acc1'"
            (input)="onNativeInput($any($event.target).value)"
          />
          <span
            class="absolute inset-0.5 rounded"
            [style.background]="draft() || 'transparent'"
            [class.cp-checker]="!draft()">
          </span>
        </label>
        <input
          type="text"
          class="flex-1 min-w-0 px-3 py-1.5 border border-slate-200 rounded-md text-sm font-mono uppercase tracking-wide text-slate-800 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
          [value]="draft()"
          (input)="onHexInput($any($event.target).value)"
          placeholder="#000000"
          spellcheck="false"
          autocomplete="off"
          maxlength="7"
        />
      </div>

      <!-- Footer -->
      <div class="flex items-center justify-between pt-2 border-t border-slate-100">
        <button
          type="button"
          (click)="clear()"
          class="text-sm text-slate-500 hover:text-slate-700 transition-colors">
          {{ 'COMMON.CLEAR_ALL' | translate }}
        </button>
        <button
          type="button"
          (click)="ok()"
          class="text-sm text-brand-600 font-medium hover:text-brand-700 transition-colors">
          {{ 'COMMON.OK' | translate }}
        </button>
      </div>
    </div>
  </ng-template>
</div>
