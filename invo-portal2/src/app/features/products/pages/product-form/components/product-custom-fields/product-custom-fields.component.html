<section class="pf-card" [formGroup]="group">
  <header class="pf-card__header">
    <div class="pf-card__icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 11h16a1 1 0 0 1 1 1v.5c0 1.5-.7 2.5-2 2.5H5c-1.3 0-2-1-2-2.5V12a1 1 0 0 1 1-1z"/>
        <path d="M5 11v-5a1 1 0 0 1 1-1h3"/><path d="M19 11v-5a1 1 0 0 0-1-1h-3"/>
        <path d="M5 19v-2a1 1 0 0 1 1-1h3"/><path d="M19 19v-2a1 1 0 0 0-1-1h-3"/>
      </svg>
    </div>
    <h2 class="pf-card__title">{{ 'PRODUCTS.FORM.CUSTOM_FIELDS' | translate }}</h2>
  </header>

  <div class="pf-card__body">
    @if (!hasFields()) {
      <p class="pf-hint">{{ 'PRODUCTS.FORM.NO_CUSTOM_FIELDS' | translate }}</p>
    } @else {
      @for (meta of metas(); track meta.key) {
        <div class="pf-field" [class.pf-field--inline]="meta.type === 'boolean'">
          <label class="pf-label">{{ meta.label }}</label>
          @if (meta.type === 'boolean') {
            <label class="pf-switch">
              <input type="checkbox" [formControlName]="meta.key"/>
              <span class="pf-switch__track"></span>
            </label>
          } @else {
            <input
              [type]="inputType(meta)"
              class="pf-input"
              [formControlName]="meta.key"
              [placeholder]="meta.label"
            />
          }
        </div>
      }
    }
  </div>
</section>
