<section class="pf-card" [formGroup]="group">
  <header class="pf-card__header">
    <div class="pf-card__icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 11h16a1 1 0 0 1 1 1v.5c0 1.5-.7 2.5-2 2.5H5c-1.3 0-2-1-2-2.5V12a1 1 0 0 1 1-1z"/>
        <path d="M5 11v-5a1 1 0 0 1 1-1h3"/><path d="M19 11v-5a1 1 0 0 0-1-1h-3"/>
        <path d="M5 19v-2a1 1 0 0 1 1-1h3"/><path d="M19 19v-2a1 1 0 0 0-1-1h-3"/>
      </svg>
    </div>
    <h2 class="pf-card__title">{{ 'PRODUCTS.FORM.CUSTOM_FIELDS' | translate }}</h2>
  </header>

  <div class="pf-card__body">
    @if (!hasFields()) {
      <div class="hint-banner">
        <svg class="hint-banner__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9"  x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <p class="hint-banner__text">{{ 'PRODUCTS.FORM.CUSTOM_FIELDS_HINT' | translate }}</p>
        <a
          routerLink="/settings/custom-fields"
          target="_blank"
          rel="noopener"
          class="hint-banner__link"
        >
          {{ 'PRODUCTS.FORM.CUSTOM_FIELDS_OPEN_SETTINGS' | translate }}
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>
      </div>
    } @else {
      @for (meta of metas(); track meta.key) {
        <div class="pf-field" [class.pf-field--inline]="meta.type === 'boolean'">
          <label class="pf-label">{{ meta.label }}</label>
          @if (meta.type === 'boolean') {
            <label class="pf-switch">
              <input type="checkbox" [formControlName]="meta.key"/>
              <span class="pf-switch__track"></span>
            </label>
          } @else {
            <input
              [type]="inputType(meta)"
              class="pf-input"
              [formControlName]="meta.key"
              [placeholder]="meta.label"
            />
          }
        </div>
      }
    }
  </div>
</section>
