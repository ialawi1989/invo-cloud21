<section class="pf-card">
  <header class="pf-card__header">
    <div class="pf-card__icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <h2 class="pf-card__title">
      {{ 'PRODUCTS.FORM.GALLERY' | translate }}
      <span class="pf-gallery-count">({{ media().length }})</span>
    </h2>
  </header>

  <div class="pf-card__body">
    <button type="button" class="pf-btn pf-btn--outline" (click)="openPicker()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      {{ 'PRODUCTS.FORM.ADD_IMAGES' | translate }}
    </button>

    @if (media().length === 0) {
      <p class="pf-hint">{{ 'PRODUCTS.FORM.NO_GALLERY_IMAGES' | translate }}</p>
    } @else {
      <div class="pf-gallery-grid">
        @for (m of media(); track m.id) {
          <div class="pf-gallery-tile" [class.pf-gallery-tile--cover]="isCover(m.id)">
            <img [src]="m.thumbnailUrl || m.defaultUrl" alt="" class="pf-gallery-img"/>
            <div class="pf-gallery-actions">
              @if (!isCover(m.id)) {
                <button
                  type="button"
                  class="pf-gallery-btn"
                  (click)="setCover(m.id)"
                  [attr.aria-label]="'PRODUCTS.FORM.SET_AS_COVER' | translate"
                  [title]="'PRODUCTS.FORM.SET_AS_COVER' | translate"
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                  </svg>
                </button>
              }
              <button
                type="button"
                class="pf-gallery-btn pf-gallery-btn--danger"
                (click)="removeAt(m.id)"
                [attr.aria-label]="'COMMON.ACTIONS.DELETE' | translate"
              >✕</button>
            </div>
            @if (isCover(m.id)) { <span class="pf-gallery-cover-badge">{{ 'PRODUCTS.FORM.COVER' | translate }}</span> }
          </div>
        }
      </div>
    }
  </div>
</section>
