<section class="pf-card">
  <header class="pf-card__header">
    <div class="pf-card__icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>
      </svg>
    </div>
    <h2 class="pf-card__title">{{ 'PRODUCTS.FORM.ATTRIBUTES' | translate }}</h2>
  </header>

  <div class="pf-card__body">
    @if (rows.length === 0) {
      <p class="pf-hint">{{ 'PRODUCTS.FORM.NO_ATTRIBUTES' | translate }}</p>
    } @else {
      <div class="pf-attr-list">
        @for (row of rows.controls; track row.value['key']; let i = $index) {
          <label class="pf-attr-row" [formGroup]="rowAt(i)">
            <input type="checkbox" formControlName="checked"/>
            <span class="pf-attr-row__title">{{ row.value['title'] }}</span>
          </label>
        }
      </div>
    }
  </div>
</section>
