<app-modal-header [title]="data.title ?? ('PRODUCTS.FORM.PICK_PRODUCTS' | translate)"/>

<div class="ppm-body">
  <label class="ppm-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input
      type="text"
      [value]="search()"
      (input)="onSearchInput($any($event.target).value)"
      [placeholder]="'COMMON.SEARCH' | translate"
    />
  </label>

  <div class="ppm-list">
    @if (visible().length === 0 && !loading()) {
      <div class="ppm-empty">{{ 'COMMON.NO_DATA' | translate }}</div>
    }

    @for (row of visible(); track row.id) {
      <label class="ppm-row" [class.ppm-row--selected]="isSelected(row.id)">
        <input
          [type]="multiple() ? 'checkbox' : 'radio'"
          name="pickProductRow"
          [checked]="isSelected(row.id)"
          (change)="toggle(row.id)"
        />

        <!-- Thumbnail (or placeholder svg when the row has no image) -->
        <div class="ppm-row__thumb" aria-hidden="true">
          @if (row.thumbnailUrl) {
            <img [src]="row.thumbnailUrl" [alt]="row.name" loading="lazy"/>
          } @else {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
              <circle cx="9" cy="9" r="2"/>
              <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
            </svg>
          }
        </div>

        <div class="ppm-row__main">
          <div class="ppm-row__name">{{ row.name }}</div>
          <div class="ppm-row__meta">
            @if (row.barcode) { <span>{{ row.barcode }}</span> }
            @if (row.sku)     { <span>· {{ row.sku }}</span> }
            @if (row.UOM)     { <span>· {{ row.UOM }}</span> }
          </div>
        </div>
        @if (row.unitCost != null) {
          <div class="ppm-row__cost">{{ row.unitCost | number:'1.0-3' }}</div>
        }
      </label>
    }

    <!-- Infinite-scroll sentinel — observer fires `loadMore()` when it
         enters the viewport; inline spinner while a next page loads. -->
    <div #scrollSentinel class="ppm-sentinel" aria-hidden="true">
      @if (loading() && rows().length > 0) {
        <span class="ppm-spinner"></span>
      }
    </div>
  </div>
</div>

<footer class="ppm-footer">
  <div class="ppm-footer__count">
    {{ 'COMMON.SELECTED_COUNT' | translate: { count: selectedCount() } }}
  </div>
  <div class="ppm-footer__actions">
    <button type="button" class="ppm-btn ppm-btn--ghost" (click)="cancel()">
      {{ 'COMMON.CANCEL' | translate }}
    </button>
    @if (multiple()) {
      <button
        type="button"
        class="ppm-btn ppm-btn--primary"
        (click)="confirm()"
        [disabled]="selectedCount() === 0"
      >
        {{ 'COMMON.SUBMIT' | translate }}
      </button>
    }
  </div>
</footer>
