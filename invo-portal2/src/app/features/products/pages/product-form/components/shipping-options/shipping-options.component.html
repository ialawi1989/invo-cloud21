<section class="pf-card" [formGroup]="group">
  <header class="pf-card__header">
    <div class="pf-card__icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
        <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
    </div>
    <h2 class="pf-card__title">{{ 'PRODUCTS.FORM.SHIPPING' | translate }}</h2>
  </header>

  <div class="pf-card__body">
    <!-- Only "Shipping Weight" is exposed per product spec — the old
         `shippingEnabled` toggle and the separate `weightUOM` picker were
         removed because the UOM is tracked at the product level and
         shipping is enabled implicitly when weight > 0. The underlying
         form still carries `shippingEnabled` / `weightUOM` so backend
         payloads stay stable. -->
    <div class="pf-field">
      <label class="pf-label">{{ 'PRODUCTS.FORM.SHIPPING_WEIGHT' | translate }}</label>
      <input type="number" class="pf-input" formControlName="weight" min="0"/>
    </div>
  </div>
</section>
