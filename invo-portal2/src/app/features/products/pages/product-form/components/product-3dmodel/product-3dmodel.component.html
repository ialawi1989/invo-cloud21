<section class="pf-card">
  <header class="pf-card__header">
    <div class="pf-card__icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2l10 5-10 5L2 7l10-5z"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
      </svg>
    </div>
    <h2 class="pf-card__title">{{ 'PRODUCTS.FORM.THREE_D_MODEL' | translate }}</h2>
  </header>

  <div class="pf-card__body">
    <div class="pf-3d-box" [class.pf-3d-box--empty]="!hasModel()">
      @if (hasModel()) {
        <div class="pf-3d-filled">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l10 5-10 5L2 7l10-5z"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
          </svg>
          <div class="pf-3d-name">{{ modelName() || ('PRODUCTS.FORM.THREE_D_MODEL' | translate) }}</div>
        </div>
      } @else {
        <div class="pf-3d-placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l10 5-10 5L2 7l10-5z"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
          </svg>
          <p>{{ 'PRODUCTS.FORM.NO_3D_MODEL' | translate }}</p>
        </div>
      }
    </div>

    <div class="pf-3d-actions">
      <button type="button" class="pf-3d-btn pf-3d-btn--primary" (click)="openPicker()">
        {{ hasModel() ? ('PRODUCTS.FORM.REPLACE_3D' | translate) : ('PRODUCTS.FORM.CHOOSE_3D' | translate) }}
      </button>
      @if (hasModel()) {
        <button type="button" class="pf-3d-btn pf-3d-btn--ghost" (click)="removeModel()">
          {{ 'COMMON.ACTIONS.DELETE' | translate }}
        </button>
      }
    </div>
  </div>
</section>
