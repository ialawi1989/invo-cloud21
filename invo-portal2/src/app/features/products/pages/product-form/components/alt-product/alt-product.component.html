<section class="pf-card">
  <header class="pf-card__header">
    <div class="pf-card__icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </div>
    <h2 class="pf-card__title">{{ 'PRODUCTS.FORM.ALT_PRODUCTS' | translate }}</h2>
  </header>

  <div class="pf-card__body">
    <button type="button" class="pf-btn pf-btn--outline" (click)="openPicker()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      {{ 'PRODUCTS.FORM.PICK_ALT' | translate }}
    </button>

    @if (rows().length === 0) {
      <p class="pf-hint">{{ 'PRODUCTS.FORM.NO_ALT_PRODUCTS' | translate }}</p>
    } @else {
      <ul class="pf-alt-list">
        @for (row of rows(); track row.id) {
          <li class="pf-alt-row">
            <span class="pf-alt-row__name">{{ row.name }}</span>
            <button
              type="button"
              class="pf-alt-row__remove"
              (click)="removeAt(row.id)"
              [attr.aria-label]="'COMMON.ACTIONS.DELETE' | translate"
            >✕</button>
          </li>
        }
      </ul>
    }
  </div>
</section>
