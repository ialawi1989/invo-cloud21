<app-modal-header [title]="'PRODUCTS.FORM.PICK_SUPPLIER' | translate"/>

<div class="psm-body">
  <!-- Search -->
  <label class="psm-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input
      type="text"
      [value]="search()"
      (input)="onSearchInput($any($event.target).value)"
      [placeholder]="'COMMON.SEARCH' | translate"
    />
  </label>

  <!-- Rows -->
  <div class="psm-list">
    @if (visibleRows().length === 0 && !loading()) {
      <div class="psm-empty">
        {{ 'COMMON.NO_DATA' | translate }}
      </div>
    }

    @for (row of visibleRows(); track row.id) {
      <label
        class="psm-row"
        [class.psm-row--selected]="isSelected(row.id)"
      >
        <input type="checkbox" [checked]="isSelected(row.id)" (change)="toggle(row.id)"/>
        <div class="psm-row__body">
          <div class="psm-row__head">
            <span class="psm-row__name">{{ row.name }}</span>
            @if (row.code) {
              <span class="psm-row__code">{{ row.code }}</span>
            }
          </div>
          @if (row.phone) {
            <small class="psm-row__meta">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              {{ row.phone }}
            </small>
          }
        </div>
      </label>
    }

    <!-- Infinite-scroll sentinel — IntersectionObserver in the component
         triggers `loadMore()` when this element enters the viewport. -->
    <div #scrollSentinel class="psm-sentinel" aria-hidden="true">
      @if (loading() && rows().length > 0) {
        <span class="psm-spinner"></span>
      }
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="psm-footer">
  <div class="psm-footer__count">
    {{ 'COMMON.SELECTED_COUNT' | translate: { count: selectedCount() } }}
  </div>
  <div class="psm-footer__actions">
    <button type="button" class="psm-btn psm-btn--ghost" (click)="cancel()">
      {{ 'COMMON.CANCEL' | translate }}
    </button>
    <button
      type="button"
      class="psm-btn psm-btn--primary"
      (click)="confirm()"
      [disabled]="selectedCount() === 0"
    >
      {{ 'COMMON.SUBMIT' | translate }}
    </button>
  </div>
</footer>
