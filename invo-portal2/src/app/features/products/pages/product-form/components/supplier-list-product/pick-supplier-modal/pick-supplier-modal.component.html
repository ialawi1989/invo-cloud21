<app-modal-header [title]="'PRODUCTS.FORM.PICK_SUPPLIER' | translate"/>

<div class="psm-body">
  <!-- Search -->
  <label class="psm-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input
      type="text"
      [value]="search()"
      (input)="onSearchInput($any($event.target).value)"
      [placeholder]="'COMMON.SEARCH' | translate"
    />
  </label>

  <!-- Rows -->
  <div class="psm-list">
    @if (visibleRows().length === 0 && !loading()) {
      <div class="psm-empty">
        {{ 'COMMON.NO_DATA' | translate }}
      </div>
    }

    @for (row of visibleRows(); track row.id) {
      <label
        class="psm-row"
        [class.psm-row--selected]="isSelected(row.id)"
      >
        <input type="checkbox" [checked]="isSelected(row.id)" (change)="toggle(row.id)"/>
        <span class="psm-row__name">{{ row.name }}</span>
      </label>
    }

    @if (hasMore()) {
      <button type="button" class="psm-more" (click)="loadMore()" [disabled]="loading()">
        @if (loading()) {
          <span class="psm-spinner" aria-hidden="true"></span>
        }
        {{ 'COMMON.LOAD_MORE' | translate }}
      </button>
    }
  </div>
</div>

<!-- Footer -->
<footer class="psm-footer">
  <div class="psm-footer__count">
    {{ 'COMMON.SELECTED_COUNT' | translate: { count: selectedCount() } }}
  </div>
  <div class="psm-footer__actions">
    <button type="button" class="psm-btn psm-btn--ghost" (click)="cancel()">
      {{ 'COMMON.CANCEL' | translate }}
    </button>
    <button
      type="button"
      class="psm-btn psm-btn--primary"
      (click)="confirm()"
      [disabled]="selectedCount() === 0"
    >
      {{ 'COMMON.SUBMIT' | translate }}
    </button>
  </div>
</footer>
