<section class="pf-card">
  <header class="pf-card__header">
    <div class="pf-card__icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <h2 class="pf-card__title">{{ 'PRODUCTS.FORM.IMAGE' | translate }}</h2>
  </header>

  <div class="pf-card__body">
    <div class="pf-image-box" [class.pf-image-box--empty]="!hasImage()">
      @if (hasImage()) {
        <img [src]="currentUrl()" [alt]="productInfo().name" class="pf-image"/>
      } @else {
        <div class="pf-image-placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>{{ 'PRODUCTS.FORM.NO_IMAGE' | translate }}</p>
        </div>
      }
    </div>

    <div class="pf-image-actions">
      <button type="button" class="pf-image-btn pf-image-btn--primary" (click)="openPicker()">
        {{ hasImage() ? ('PRODUCTS.FORM.REPLACE_IMAGE' | translate) : ('PRODUCTS.FORM.CHOOSE_IMAGE' | translate) }}
      </button>
      @if (hasImage()) {
        <button type="button" class="pf-image-btn pf-image-btn--ghost" (click)="removeImage()">
          {{ 'COMMON.ACTIONS.DELETE' | translate }}
        </button>
      }
    </div>
  </div>
</section>
